user nginx;
worker_processes auto;
pcre_jit on;
error_log /var/log/nginx/error.log warn;
include /etc/nginx/modules/*.conf; 

events {                                                            
        # The maximum number of simultaneous connections that can be opened by
        # a worker process.       
        worker_connections 1024;                                                                                                         
}

# generated 2026-02-01, Mozilla Guideline v5.7, nginx 1.28, OpenSSL 3.4.0, intermediate config
# https://ssl-config.mozilla.org/#server=nginx&version=1.28&config=intermediate&openssl=3.4.0&guideline=5.7
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    client_max_body_size 1m;
    gzip on;
    gzip_vary on;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    server {
        server_name dev.bercik.xyz;

        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        ssl_certificate /etc/certs/bercik.xyz/fullchain.pem;
        ssl_certificate_key /etc/certs/bercik.xyz/privkey.pem;

        root /var/www/dev/;

        error_page 404 /404/index.html;

        location / {
            try_files $uri $uri/ index.html;
        }
    }

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;  # about 40000 sessions

    ssl_dhparam "/etc/certs/dhparam";

    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        return 301 https://$host$request_uri;
    }
}
